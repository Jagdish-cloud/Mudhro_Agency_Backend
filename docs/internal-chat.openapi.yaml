openapi: 3.0.3
info:
  title: Mudhro Internal Chat API
  version: "1.0.0"
  description: Organization-scoped chat REST surface (authenticated JWT).
servers:
  - url: /api
paths:
  "/organizations/{orgId}/internal-chat/chats":
    get:
      summary: List chats for current user
      parameters:
        - in: path
          name: orgId
          required: true
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: cursor
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200":
          description: Envelope `{ success: true, data: { items, nextCursor } }`
  "/organizations/{orgId}/internal-chat/chats/direct":
    post:
      summary: Create or reuse direct chat
      parameters:
        - in: path
          name: orgId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                peerOrganizationUserId:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Created `{ success, data: { chatId } }`
  "/organizations/{orgId}/internal-chat/chats/group":
    post:
      summary: Create group chat
      parameters:
        - in: path
          name: orgId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                memberOrganizationUserIds:
                  type: array
                  items: { type: string, format: uuid }
                imageFileId: { type: string, format: uuid }
      responses:
        "201":
          description: `{ success, data: { chatId } }`
